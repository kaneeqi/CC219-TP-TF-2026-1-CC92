name: fonazo

services:
  back:
    build: ./back
    container_name: fonazo-back
    ports:
      - "8000:8000"
    volumes:
      - ./back/modelos:/app/modelos:ro

  front:
    build:
      context: ./front
      args:
        VITE_API_URL: /api
    container_name: fonazo-front
    ports:
      - "5173:80"
    depends_on:
      - back
