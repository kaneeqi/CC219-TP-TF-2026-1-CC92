server {
    listen 80;
    server_name _;

    # Reenvia las llamadas de la API al servicio "back" dentro de la red
    # de docker-compose (el frontend llama a /api/... como ruta relativa).
    location /api/ {
        proxy_pass http://back:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
